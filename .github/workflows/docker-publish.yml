name: Docker Hub Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (e.g. 1.2.3). Empty = auto from ref."
        required: false
      include_mobile:
        description: "Bundle Android APK in the image"
        type: boolean
        default: false

concurrency:
  group: docker-hub-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: task-bridge

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: apps/backend

      - name: Run backend tests
        run: npm test
        working-directory: apps/backend

  publish:
    name: Build & push
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Docker Hub username
        id: hub
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::Repository variable DOCKERHUB_USERNAME is not set."
            echo "Go to Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          echo "username=${DOCKERHUB_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "image=${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Compute version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            DATE=$(date -u +%Y%m%d)
            VERSION="${DATE}-${SHORT_SHA}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version tag: ${VERSION}"

      - name: Build Android APK
        if: github.event.inputs.include_mobile == true
        run: node scripts/docker-mobile-build.mjs

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.hub.outputs.username }}
          password: ${{ secrets.DOCKER_HUB_SECRET_KEY }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.hub.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.value }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Job summary
        run: |
          {
            echo "### Published to Docker Hub"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ steps.hub.outputs.image }}\` |"
            echo "| **Version tag** | \`${{ steps.version.outputs.value }}\` |"
            echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            echo ""
            echo "**Pull:**"
            echo "\`\`\`"
            echo "docker pull ${{ steps.hub.outputs.image }}:${{ steps.version.outputs.value }}"
            echo "\`\`\`"
            echo ""
            echo "**Run:**"
            echo "\`\`\`"
            echo "TASK_BRIDGE_IMAGE=${{ steps.hub.outputs.image }}:${{ steps.version.outputs.value }} docker compose -f deploy/docker-compose.yml up -d"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
