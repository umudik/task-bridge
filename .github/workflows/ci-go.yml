name: Go CI

# Drop-in Go CI workflow. Expects go.mod at repo root (or adjust working-directory).
# Tools used:
#   go vet     — official static analysis
#   staticcheck — https://staticcheck.io  (install separately if needed)
#   golangci-lint — https://golangci-lint.run  (includes vet + staticcheck + many more)
#   go test    — race detector + coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # reads the Go version from go.mod
          cache: true               # caches module download cache

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.txt
          fail_ci_if_error: false
