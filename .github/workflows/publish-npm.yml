name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          registry-url: https://registry.npmjs.org

      - name: Resolve publish version
        id: version
        run: |
          node scripts/npm-publish-version.mjs
          npm install --package-lock-only

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Install backend dependencies
        run: npm --prefix apps/backend install

      - name: Build web + backend
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet && exit 0
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git push
