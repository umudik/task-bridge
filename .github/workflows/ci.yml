name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, web, mcp]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/${{ matrix.app }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Lint
        run: npm run lint
        working-directory: apps/${{ matrix.app }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: apps/backend

      - name: Run backend tests
        run: npm test
        working-directory: apps/backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Install backend deps
        run: npm ci
        working-directory: apps/backend

      - name: Install web deps
        run: npm ci
        working-directory: apps/web

      - name: Install MCP deps
        run: npm ci
        working-directory: apps/mcp

      - name: Build
        run: npm run build

      - name: Build MCP
        run: npm run build
        working-directory: apps/mcp
