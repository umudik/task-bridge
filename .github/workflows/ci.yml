name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Typecheck
        run: npm run typecheck
        working-directory: apps/${{ matrix.app }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: apps/${{ matrix.app }}

      - name: Lint
        run: npm run lint
        working-directory: apps/${{ matrix.app }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install backend deps
        run: npm ci
        working-directory: apps/backend

      - name: Install web deps
        run: npm ci
        working-directory: apps/web

      - name: Build
        run: npm run build
