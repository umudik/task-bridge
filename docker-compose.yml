services:
  task-bridge:
    image: ${TASK_BRIDGE_IMAGE:-taskbridge/task-bridge:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${TASK_BRIDGE_VERSION:-0.1.0}
    environment:
      PORT: "3000"
      DATABASE_PATH: /app/data/bridge.db
    volumes:
      - task_bridge_data:/app/data
    ports:
      - "${TASK_BRIDGE_PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mobile-build:
    profiles: ["mobile"]
    build:
      context: .
      dockerfile: Dockerfile.mobile
    image: task-bridge-mobile:local
    volumes:
      - ./artifacts:/out
    entrypoint: ["cp", "/task-bridge.apk", "/out/task-bridge.apk"]

volumes:
  task_bridge_data:
