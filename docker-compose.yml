services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      PORT: "3000"
      BACKEND_API_KEY: ${BACKEND_API_KEY:-dev-key}
      NGROK_INSPECTOR_URL: http://ngrok:4040
      DATABASE_PATH: /app/data/bridge.db
      BRIDGE_TASKS_PATH: /app/data/bridge-tasks.json
    volumes:
      - bridge_data:/app/data
      - ./data:/app/data
    ports:
      - "3001:3000"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    command:
      - start
      - --all
      - --config
      - /etc/ngrok.yml
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bridge_data:
