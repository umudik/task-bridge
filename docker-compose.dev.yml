services:
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    command:
      - start
      - --all
      - --config
      - /etc/ngrok.yml
    volumes:
      - ./ngrok.dev.yml:/etc/ngrok.yml:ro
    ports:
      - "4040:4040"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
